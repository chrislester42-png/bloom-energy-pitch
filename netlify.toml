# Netlify config — static Next.js export + a serverless quote proxy.
# On Git import Netlify reads this automatically.
[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Live price proxy lives at /.netlify/functions/quote
# Requires env var FINNHUB_API_KEY (Site settings → Environment variables).
